apiVersion: v1
kind: Config
current-context: personal-cluster
clusters:
- name: personal-cluster
  cluster:
    server: https://personal.k8s.example:6443
    insecure-skip-tls-verify: true
- name: work-cluster
  cluster:
    server: https://work.k8s.example:6443
    insecure-skip-tls-verify: true
contexts:
- name: personal-cluster
  context:
    cluster: personal-cluster
    user: personal-user
    namespace: default
- name: work-cluster
  context:
    cluster: work-cluster
    user: work-user
    namespace: default
users:
- name: personal-user
  user:
    token: stub-personal-token
- name: work-user
  user:
    token: stub-work-token
preferences: {}
